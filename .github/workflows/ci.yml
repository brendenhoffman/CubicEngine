name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  fmt:
    name: rustfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check
  # This job runs on ubuntu-latest and only type-checks against each target triple.
  # It verifies the code compiles and lints clean for that target; it does NOT verify
  # that an actual build links successfully on that platform. Real builds for the
  # windows-msvc and macOS targets need either a native runner or a cross toolchain
  # (cargo-xwin for windows-msvc), which we don't have set up yet.
  clippy:
    name: clippy (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - aarch64-pc-windows-msvc
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - x86_64-apple-darwin
          - x86_64-pc-windows-msvc
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustup target add
        run: rustup target add ${{ matrix.target }}
      # Clippy only needs to type-check; it won't actually link,
      # so we don't need cross linkers.
      - name: cargo clippy (fail on warnings)
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings
  cargo-deny:
    name: cargo-deny (advisories / licenses / bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # If you want to skip advisory fetches on forks/offline, add:
          # arguments: --disable-fetch
  unsafe-lint:
    name: check headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure crate roots deny unsafe_op_in_unsafe_fn
        shell: bash
        run: tools/check-headers.sh
  # cubic-game only ever targets wasm32-wasip1 (it's excluded from
  # workspace default-members for that reason), so the clippy matrix above
  # type-checking it against desktop targets doesn't verify the thing that
  # actually ships. wasm32-wasip1 is tier-2 with full std support, so it
  # builds and links natively on ubuntu-latest with no cross toolchain.
  cubic-game-wasm:
    name: cubic-game (wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustup target add wasm32-wasip1
        run: rustup target add wasm32-wasip1
      - name: cargo clippy (fail on warnings)
        run: cargo clippy -p cubic-game --target wasm32-wasip1 --all-targets -- -D warnings
      - name: cargo build --release
        run: cargo build -p cubic-game --target wasm32-wasip1 --release
  # Gate merges on everything passing
  ci-ok:
    name: all checks
    runs-on: ubuntu-latest
    needs: [fmt, clippy, cargo-deny, unsafe-lint, cubic-game-wasm]
    steps:
      - run: echo "All good!"
